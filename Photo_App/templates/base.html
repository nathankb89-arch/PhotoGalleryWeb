<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f7f7f7; color: #222; }
        nav { background: #222; color: white; padding: 15px; }
        nav a { color: white; margin-right: 12px; text-decoration: none; }
        .container { max-width: 1000px; margin: 20px auto; padding: 20px; background: white; }
        .card { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; }
        .photo { width: 100%; max-height: 300px; object-fit: cover; }
        .message { padding: 10px; background: #e8f5e9; margin-bottom: 15px; }
        form { margin-top: 10px; }
        input, textarea, button { padding: 8px; margin-top: 5px; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'home' %}">Home</a>
        {% if user.is_authenticated %}
            <a href="{% url 'profile' %}">Profile</a>
            <a href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="message">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
